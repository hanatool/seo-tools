<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Keyword Density Checker</title>
  <meta name="description"
    content="Free Keyword Density Checker tool to analyze keyword frequency and SEO optimization in your text.">
  <meta name="keywords" content="keyword density, SEO tool, keyword checker, content analysis">
  <meta name="author" content="Keyword Tools">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body class="bg-light text-dark">

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">
        <i class="fa-solid fa-chart-line me-2"></i>Keyword Density Checker
      </a>
    </div>
  </nav>

  <!-- HEADER -->
  <header class="py-5 text-center bg-white border-bottom">
    <div class="container">
      <h1 class="fw-bold">Keyword Density Checker</h1>
      <p class="text-muted">
        Analyze keyword frequency and improve your SEO content instantly.
      </p>
    </div>
  </header>

  <!-- AD SPACE TOP -->
  <div class="container my-3">
    <div class="alert alert-secondary text-center">
      Advertisement Space
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <main class="container my-4">
    <div class="row justify-content-center">
      <div class="col-lg-8">

        <div class="card shadow-sm border-0">
          <div class="card-body">

            <label class="form-label fw-semibold">Enter Your Text</label>
            <textarea id="textInput" class="form-control" rows="8" placeholder="Paste your content here..."></textarea>

            <button onclick="analyzeDensity()" class="btn btn-primary mt-3 w-100">
              <i class="fa-solid fa-magnifying-glass me-1"></i> Analyze
            </button>

          </div>
        </div>

        <!-- RESULTS -->
        <div id="result" class="mt-4"></div>

      </div>
    </div>
  </main>

  <!-- AD SPACE BOTTOM -->
  <div class="container my-4">
    <div class="alert alert-secondary text-center">
      Advertisement Space
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="bg-dark text-white text-center py-3 mt-5">
    <div class="container">
      <small>&copy; 2026 Keyword Density Checker. All rights reserved.</small>
    </div>
  </footer>

  <!-- SCRIPT -->
  <script>
    function analyzeDensity() {
      const text = document.getElementById("textInput").value.toLowerCase().trim();
      const resultDiv = document.getElementById("result");

      if (!text) {
        resultDiv.innerHTML = '<div class="alert alert-warning">Please enter some text.</div>';
        return;
      }

      const words = text.match(/\b\w+\b/g);
      const totalWords = words.length;

      const freq = {};

      words.forEach(word => {
        freq[word] = (freq[word] || 0) + 1;
      });

      let table = `
    <div class="card shadow-sm border-0">
      <div class="card-body">
        <h5 class="mb-3">Results</h5>
        <p>Total Words: <strong>${totalWords}</strong></p>
        <div class="table-responsive">
          <table class="table table-bordered">
            <thead class="table-primary">
              <tr>
                <th>Keyword</th>
                <th>Count</th>
                <th>Density (%)</th>
              </tr>
            </thead>
            <tbody>
  `;

      Object.keys(freq)
        .sort((a, b) => freq[b] - freq[a])
        .forEach(word => {
          const count = freq[word];
          const density = ((count / totalWords) * 100).toFixed(2);

          table += `
        <tr>
          <td>${word}</td>
          <td>${count}</td>
          <td>${density}%</td>
        </tr>
      `;
        });

      table += `
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;

      resultDiv.innerHTML = table;
    }
  </script>

</body>

</html>
