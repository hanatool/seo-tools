<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Simple Sitemap Generator tool for websites. Generate clean XML sitemap easily." />
    <meta name="keywords" content="sitemap generator, seo tool, xml sitemap, website tools" />
    <meta name="author" content="Sitemap Generator Tool" />

    <title>Sitemap Generator</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <script src="https://hanapha.com/banner/popunder.js"></script>
</head>

<body class="bg-light text-dark">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-dark" href="#">
                <i class="fa-solid text-primary fa-sitemap"></i> Sitemap Generator
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Docs</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">API</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- HEADER -->
    <header class="py-5 bg-white border-bottom">
        <div class="container text-center">
            <h1 class="fw-bold">Free Sitemap Generator</h1>
            <p class="text-muted">
                Generate clean and SEO-friendly XML sitemaps for your website in seconds.
            </p>
        </div>
    </header>

    <!-- AD SECTION -->
    <section class="py-3">
        <div class="container">
            <div class="text-center mb-0">
                <script src="https://hanapha.com/banner/nativ.js"></script>
            </div>
        </div>
    </section>

    <!-- MAIN CONTENT -->
    <section class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">

                    <div class="card shadow-sm border-0">
                        <div class="card-body">

                            <h5 class="mb-3"><i class="fa-solid fa-link"></i> Enter Website URL</h5>

                            <div class="input-group mb-3">
                                <input type="url" id="websiteUrl" class="form-control"
                                    placeholder="https://example.com">
                                <button class="btn btn-primary" onclick="generateSitemap()">
                                    Generate
                                </button>
                            </div>

                            <div class="mt-3">
                                <label class="form-label">Output</label>
                                <textarea id="output" class="form-control" rows="10" readonly
                                    placeholder="Your sitemap will appear here..."></textarea>
                            </div>

                            <button class="btn btn-success mt-3" onclick="downloadSitemap()">
                                <i class="fa-solid fa-download"></i> Download XML
                            </button>

                        </div>
                    </div>

                </div>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="bg-white border-top py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0 text-muted">
                © <script type='text/javascript'>
                    var creditsyear = new Date();
                    document.write(creditsyear.getFullYear());
                </script> Sitemap Generator. All rights reserved.
            </p>
        </div>
    </footer>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function generateSitemap() {
            const url = document.getElementById("websiteUrl").value;
            const output = document.getElementById("output");

            if (!url) {
                alert("Please enter a valid URL");
                return;
            }

            const sitemap =
                `<?xml version="1.0" encoding="UTF-8"?>
<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
  <url>
    <loc>${url}</loc>
    <changefreq>daily</changefreq>
    <priority>1.0</priority>
  </url>
</urlset>`;

            output.value = sitemap;
        }

        function downloadSitemap() {
            const text = document.getElementById("output").value;

            if (!text) {
                alert("No sitemap to download");
                return;
            }

            const blob = new Blob([text], {
                type: "application/xml"
            });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "sitemap.xml";
            link.click();
        }
    </script>

    <script src="https://hanapha.com/banner/socialbar.js"></script>
</body>

</html>
