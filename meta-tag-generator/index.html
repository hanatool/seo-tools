<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meta Tag Generator</title>

  <!-- Meta SEO -->
  <meta name="description" content="Generate meta tags easily with a modern Bootstrap tool." />
  <meta name="keywords" content="meta tag generator, seo, html meta tags" />
  <meta name="author" content="Meta Generator Tool" />

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body class="bg-light text-dark">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold text-dark" href="#">
        <i class="fa-solid fa-code text-primary me-2"></i>MetaTag Generator
      </a>
    </div>
  </nav>

  <!-- Header -->
  <header class="py-5 text-center bg-white border-bottom">
    <div class="container">
      <h1 class="fw-bold">Meta Tag Generator</h1>
      <p class="text-muted">Create SEO friendly meta tags instantly using Bootstrap UI</p>
    </div>
  </header>

  <!-- Main Content -->
  <div class="container py-4">
    <div class="row g-4">

      <!-- Form -->
      <div class="col-lg-8">
        <div class="card shadow-sm border-0">
          <div class="card-body">

            <h5 class="mb-3 fw-bold">Input Data</h5>

            <div class="mb-3">
              <label class="form-label">Website Title</label>
              <input type="text" id="title" class="form-control" placeholder="Enter website title">
            </div>

            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea id="description" class="form-control" rows="3" placeholder="Enter description"></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label">Keywords</label>
              <input type="text" id="keywords" class="form-control" placeholder="keyword1, keyword2, keyword3">
            </div>

            <div class="mb-3">
              <label class="form-label">Author</label>
              <input type="text" id="author" class="form-control" placeholder="Author name">
            </div>

            <button class="btn btn-primary w-100" onclick="generateMeta()">
              <i class="fa-solid fa-bolt me-1"></i>Generate Meta Tags
            </button>

          </div>
        </div>

        <!-- Output -->
        <div class="card shadow-sm border-0 mt-4">
          <div class="card-body">
            <h5 class="fw-bold">Generated Meta Tags</h5>
            <textarea id="output" class="form-control mt-2" rows="10" readonly></textarea>
            <button class="btn btn-success mt-3" onclick="copyMeta()">
              <i class="fa-solid fa-copy me-1"></i>Copy
            </button>
          </div>
        </div>

      </div>

      <!-- Ad Space -->
      <div class="col-lg-4">
        <div class="card border-0 shadow-sm text-center">
          <div class="card-body">
            <h6 class="fw-bold">Advertisement</h6>
            <p class="text-muted">Your ad space here</p>
            <div class="border rounded p-5 bg-light">
              Ad Banner
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-white border-top mt-5 py-3">
    <div class="container text-center text-muted">
      <small>© <script type='text/javascript'>
          var creditsyear = new Date();
          document.write(creditsyear.getFullYear());
        </script> Meta Tag Generator. All rights reserved.</small>
    </div>
  </footer>

  <!-- Script -->
  <script>
    function generateMeta() {
      let title = document.getElementById("title").value;
      let description = document.getElementById("description").value;
      let keywords = document.getElementById("keywords").value;
      let author = document.getElementById("author").value;

      let meta = `
<meta charset="UTF-8">
<meta content='width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0' name='viewport'/>
<title>${title}</title>
<meta name="description" content="${description}">
<meta name="keywords" content="${keywords}">
<meta name="author" content="${author}">
  `;

      document.getElementById("output").value = meta.trim();
    }

    function copyMeta() {
      let output = document.getElementById("output");
      output.select();
      document.execCommand("copy");
      alert("Meta tags copied!");
    }
  </script>

</body>

</html>
